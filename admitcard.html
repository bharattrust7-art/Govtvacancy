<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10+2 Vacancy — Latest Jobs</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🔥 ATTRACTIVE NAVBAR -->
<nav class="navbar">
  <div class="logo">10+2 Vacancy</div>

  <ul class="menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="admitcard.html">Admit Card</a></li>
    <li><a href="result.html">Result</a></li>
    
  </ul>

  <input type="text" id="search" placeholder="Search jobs...">
</nav>

<!-- 🔥 HERO SECTION -->
<section class="hero">
  <h1>Latest Government Jobs for 10th & 12th Pass</h1>
  <p>Apply Online • Download Admit Card • View Notifications</p>
</section>

<!-- CATEGORY FILTER -->
<div class="filters">
<button onclick="filterJobs('All')">All</button>
<button onclick="filterJobs('10th Pass')">10th Pass</button>
<button onclick="filterJobs('12th Pass')">12th Pass</button>
<button onclick="filterJobs('Graduate')">Graduate</button>
</div>

<!-- JOB LIST -->
<div id="jobs" class="job-container"></div>

<footer>
<p>© 2026 10+2 Vacancy | All Rights Reserved</p>
</footer>

<script>
let allJobs=[];

fetch('jobs/jobs.json')
.then(res => res.json())
.then(data => {
    allJobs=data;
    displayJobs(data);
});

function displayJobs(data){
    let html="";
    data.forEach(job=>{
        html += `
        <div class="job">
        <h2>${job.title}</h2>
        <p>${job.category}</p>

        <div class="buttons">
        <button class="apply">Apply Now</button>
        <button class="notify">View Notification</button>
        <button class="admit">Admit Card</button>
        </div>

        </div>`;
    });
    document.getElementById("jobs").innerHTML = html;
}

function filterJobs(category){
    if(category=="All") displayJobs(allJobs);
    else displayJobs(allJobs.filter(j=>j.category==category));
}

document.getElementById("search").addEventListener("keyup", function(){
    let text=this.value.toLowerCase();
    displayJobs(allJobs.filter(j=>j.title.toLowerCase().includes(text)));
});
</script>

</body>
</html>
